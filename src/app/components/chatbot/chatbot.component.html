<div class="chat-wrapper z-[99999] fixed bottom-6 right-6 flex flex-col items-end">
  
  <!-- Chat Window -->
  <div class="chat-window mb-4 bg-[#1a1f35]/80 backdrop-blur-xl border border-white/20 rounded-2xl shadow-2xl overflow-hidden flex flex-col transition-all duration-300 origin-bottom-right" 
       style="backface-visibility: hidden; transform: translateZ(0); will-change: transform, opacity;"
       [ngClass]="isOpen ? 'scale-100 opacity-100 pointer-events-auto' : 'scale-0 opacity-0 pointer-events-none'">
    
    <!-- Header -->
    <div class="p-4 border-b border-white/10 flex justify-between items-center bg-gradient-to-r from-blue-900/40 to-purple-900/60">
      <div class="flex items-center gap-3">
        <div class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse shadow-[0_0_8px_rgba(74,222,128,0.8)]"></div>
        <h3 class="text-white font-semibold m-0 text-sm tracking-widest">MARSHELL</h3>
      </div>
      <button (click)="toggleChat()" class="text-white/60 hover:text-white transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Body -->
    <div #chatBody class="chat-body flex-1 p-4 overflow-y-auto flex flex-col gap-3 min-h-[300px] max-h-[400px] w-[320px] sm:w-[350px]">
      <div *ngFor="let msg of messages" class="max-w-[85%] px-4 py-2.5 text-sm loading-relaxed"
           [ngClass]="msg.sender === 'user' ? 'bg-gradient-to-r from-blue-600 to-blue-500 text-white self-end rounded-2xl rounded-tr-sm shadow-md' : 'bg-white/10 text-gray-100 self-start border border-white/10 rounded-2xl rounded-tl-sm shadow-md'"
           style="backface-visibility: hidden;"
           [innerHTML]="msg.text">
      </div>
      
      <!-- Typing Indicator -->
      <div *ngIf="isTyping" class="bg-white/10 text-gray-100 self-start border border-white/10 rounded-2xl rounded-tl-sm px-4 py-4 flex gap-1.5 items-center shadow-md w-fit">
        <span class="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce"></span>
        <span class="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>
        <span class="w-1.5 h-1.5 bg-white/60 rounded-full animate-bounce" style="animation-delay: 0.4s"></span>
      </div>
    </div>

    <!-- Footer Input -->
    <div class="p-3 border-t border-white/10 bg-black/30">
      <div class="flex gap-2">
        <input type="text" [(ngModel)]="userInput" (keyup.enter)="sendMessage()" 
               placeholder="Ask me anything..." 
               class="flex-1 bg-white/5 border border-white/10 rounded-full px-4 py-2 text-sm text-white focus:outline-none focus:border-blue-500/50 transition-colors placeholder:text-gray-400 shadow-inner">
        <button (click)="sendMessage()" [disabled]="!userInput.trim() || isTyping"
                class="w-10 h-10 flex items-center justify-center rounded-full bg-gradient-to-br from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 mr-0.5 mt-0.5" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Floating Greeting Notification -->
  <div *ngIf="showGreeting && !isOpen"
       (click)="toggleChat()"
       class="greeting-bubble mb-5 mr-1 relative bg-white/95 backdrop-blur-md border border-white/20 p-4 rounded-2xl rounded-br-sm shadow-[0_10px_40px_rgba(0,0,0,0.5)] cursor-pointer hover:scale-105 transition-transform duration-300 z-40">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-600 to-indigo-600 flex justify-center items-center text-white font-bold text-xs shadow-inner">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div class="pr-2">
        <p class="text-sm font-bold text-gray-800 m-0 leading-tight">Hey! I'm Marshell ✨</p>
        <p class="text-xs text-gray-600 m-0 mt-0.5 font-medium">Viswa's AI assistant</p>
      </div>
    </div>
    <!-- Little tail pointing down to the button -->
    <div class="absolute -bottom-2 right-6 w-4 h-4 bg-white/95 backdrop-blur-md transform rotate-45 border-r border-b border-white/20"></div>
    
    <!-- Close bubble button -->
    <button (click)="showGreeting = false; $event.stopPropagation()" class="absolute -top-2 -right-2 w-6 h-6 bg-gray-800 hover:bg-gray-700 text-white rounded-full flex justify-center items-center shadow-md transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Toggler Button -->
  <button (click)="toggleChat()" 
          class="w-16 h-16 rounded-full bg-gradient-to-br from-purple-500 to-indigo-600 shadow-xl shadow-purple-600/50 flex items-center justify-center text-white hover:scale-110 active:scale-95 transition-all duration-300 group z-50">
    <svg *ngIf="!isOpen" xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 group-hover:-mt-1 transition-all" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
      <path d="M12 7l1.5 3.5L17 12l-3.5 1.5L12 17l-1.5-3.5L7 12l3.5-1.5L12 7z" fill="currentColor" stroke="none" />
    </svg>
    <svg *ngIf="isOpen" xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
    </svg>
  </button>
</div>
