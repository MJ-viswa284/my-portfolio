<router-outlet></router-outlet>

<!-- 🖱️ Custom Animated Cursor Aura -->
<div class="custom-cursor-outline hidden md:block"></div>

<!-- ⬅️ Global Back Arrow -->
<button
  (click)="goBack()"
  class="fixed top-3 left-3 z-[9999] w-8 h-8 flex items-center justify-center rounded-full
         bg-white/10 border border-white/20 text-white backdrop-blur-md
         hover:bg-white/20 transition duration-300 shadow-sm active:scale-90"
  title="Go Back"
>
  <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"></polyline>
  </svg>
</button>

<!-- 🎧 Mini Music Toggle -->
<button
  (click)="toggleMusic()"
  class="fixed top-3 right-3 z-[9999] w-8 h-8 flex items-center justify-center rounded-full
         bg-white/10 border border-white/20 text-white backdrop-blur-md
         hover:bg-white/20 transition duration-300 shadow-sm active:scale-90"
  [ngClass]="{ 'music-breath': isMusicPlaying, 'text-cyan-400': isMusicPlaying }"
  title="{{ isMusicPlaying ? 'Turn off music' : 'Turn on music' }}"
>
  <div class="relative w-4 h-4">
    <svg *ngIf="isMusicPlaying" @fadeIcon xmlns="http://www.w3.org/2000/svg"
      class="absolute inset-0 w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11 5L6 9H2v6h4l5 4V5z" />
      <path d="M16.5 8.5a5 5 0 010 7" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <path d="M19 5.5a9 9 0 010 13" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </svg>
    <svg *ngIf="!isMusicPlaying" @fadeIcon xmlns="http://www.w3.org/2000/svg"
      class="absolute inset-0 w-4 h-4" viewBox="0 0 24 24" fill="currentColor">
      <path d="M11 5L6 9H2v6h4l5 4V5z" />
      <path d="M19 8l-6 8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
      <path d="M13 8l6 8" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
</button>

<!-- 🤖 Global Chatbot Widget -->
<app-chatbot></app-chatbot>
